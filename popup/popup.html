<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <h1>Claude Chat Navigator</h1>
    <p class="desc">대화 주제 자동 분류 및 네비게이션</p>

    <div class="field">
      <label for="provider">API 제공자</label>
      <select id="provider">
        <option value="openai">OpenAI</option>
        <option value="anthropic">Anthropic</option>
      </select>
    </div>

    <div class="field">
      <label for="apiKey">API Key</label>
      <input type="password" id="apiKey" placeholder="sk-... 또는 sk-ant-...">
    </div>

    <div class="field">
      <label for="model">모델</label>
      <select id="model">
        <optgroup label="OpenAI" id="openai-models">
          <option value="gpt-5-mini">gpt-5-mini</option>
          <option value="gpt-4o-mini">gpt-4o-mini</option>
          <option value="gpt-4o">gpt-4o</option>
        </optgroup>
        <optgroup label="Anthropic" id="anthropic-models">
          <option value="claude-haiku-4-5-20241001">claude-haiku-4-5</option>
          <option value="claude-sonnet-4-6">claude-sonnet-4-6</option>
        </optgroup>
      </select>
    </div>

    <button id="saveBtn">저장</button>
    <div id="status" class="status"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
